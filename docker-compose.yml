# ============================================================================
# FinVerse — Docker Compose (Development)
# ============================================================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose up -d db       # Start only PostgreSQL
#   docker-compose down           # Stop all services
#   docker-compose logs -f api    # Tail backend logs
# ============================================================================



services:
  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: finverse-db
    environment:
      POSTGRES_DB: finverse
      POSTGRES_USER: finverse
      POSTGRES_PASSWORD: finverse_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finverse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # FastAPI Backend
  # --------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finverse-api
    environment:
      DATABASE_URL: postgresql+asyncpg://finverse:finverse_dev_2026@db:5432/finverse
      JWT_SECRET_KEY: finverse-super-secret-jwt-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --------------------------------------------------------------------------
  # Next.js Frontend
  # --------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finverse-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
